apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-frontend
  labels:
    app: product-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-frontend
  template:
    metadata:
      labels:
        app: product-frontend
    spec:
      containers:
        - name: frontend
          image: 822800/productfrontend:4dc1fe63ab995db6a67e737f67a60ac090c15ab4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: BACKEND_URL
              value: http://product-backend:5000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
