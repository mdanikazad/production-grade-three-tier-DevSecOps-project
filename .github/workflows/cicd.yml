name: Enterprise DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - Frontend/**
      - Backend/**
      - k8s-manifests/**
      - .github/workflows/cicd.yml

permissions:
  contents: write

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: jubair-testing-eks-cluster
  BACKEND_IMAGE: jubair2002/productbackend
  FRONTEND_IMAGE: jubair2002/productfrontend

jobs:
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Gitleaks Scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --report-format=json \
            --report-path=/repo/gitleaks-report.json \
            --redact \
            --exit-code 0

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn

  checkov-k8s:
    name: Checkov Kubernetes Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov Kubernetes scan
        run: |
          checkov -d k8s-manifests \
            --framework kubernetes \
            --output json > checkov-k8s-report.json || true

      - name: Upload Checkov Kubernetes report
        uses: actions/upload-artifact@v4
        with:
          name: checkov-k8s-report
          path: checkov-k8s-report.json
          if-no-files-found: warn

  checkov-dockerfile:
    name: Checkov Dockerfile Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov Dockerfile scan
        run: |
          checkov -d . \
            --framework dockerfile \
            --output json > checkov-dockerfile-report.json || true

      - name: Upload Checkov Dockerfile report
        uses: actions/upload-artifact@v4
        with:
          name: checkov-dockerfile-report
          path: checkov-dockerfile-report.json
          if-no-files-found: warn

  frontend-trivy-fs:
    name: Frontend Trivy FS Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: latest
          cache: true

      - name: Run Trivy FS scan on Frontend (JSON)
        run: |
          trivy fs ./Frontend \
            --format json \
            --output frontend-trivy-fs-report.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0

      - name: Run Trivy FS scan on Frontend (TABLE)
        run: |
          trivy fs ./Frontend \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 > frontend-trivy-fs-report.txt

      - name: Upload Frontend Trivy JSON report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-trivy-fs-json-report
          path: frontend-trivy-fs-report.json
          if-no-files-found: warn

      - name: Upload Frontend Trivy TABLE report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-trivy-fs-table-report
          path: frontend-trivy-fs-report.txt
          if-no-files-found: warn

  backend-trivy-fs:
    name: Backend Trivy FS Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: latest
          cache: true

      - name: Run Trivy FS scan on Backend (JSON)
        run: |
          trivy fs ./Backend \
            --format json \
            --output backend-trivy-fs-report.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0

      - name: Run Trivy FS scan on Backend (TABLE)
        run: |
          trivy fs ./Backend \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 > backend-trivy-fs-report.txt

      - name: Upload Backend Trivy JSON report
        uses: actions/upload-artifact@v4
        with:
          name: backend-trivy-fs-json-report
          path: backend-trivy-fs-report.json
          if-no-files-found: warn

      - name: Upload Backend Trivy TABLE report
        uses: actions/upload-artifact@v4
        with:
          name: backend-trivy-fs-table-report
          path: backend-trivy-fs-report.txt
          if-no-files-found: warn

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    needs:
      - frontend-trivy-fs
      - checkov-k8s
      - checkov-dockerfile
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Frontend dependencies
        run: npm ci

      - name: Run Frontend tests
        run: npm test --if-present
        continue-on-error: true

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    needs:
      - backend-trivy-fs
      - checkov-k8s
      - checkov-dockerfile
    defaults:
      run:
        working-directory: Backend
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install Backend dependencies
        run: npm ci

      - name: Run Backend tests
        run: npm test --if-present
        continue-on-error: true

  docker-build-push:
    name: Docker Build, Scan & Push
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-test
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Backend image
        uses: docker/build-push-action@v7
        with:
          context: ./Backend
          load: true
          push: false
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build Frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./Frontend
          load: true
          push: false
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: latest
          cache: true

      - name: Scan Backend image
        run: |
          trivy image ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0

      - name: Scan Frontend image
        run: |
          trivy image ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0

      - name: Push Backend image
        uses: docker/build-push-action@v7
        with:
          context: ./Backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Push Frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./Frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  update-k8s-manifests:
    name: Update K8s Manifest Image Tags
    needs: docker-build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update backend image tag
        run: |
          sed -i "s|image: ${{ env.BACKEND_IMAGE }}:.*|image: ${{ env.BACKEND_IMAGE }}:${GITHUB_SHA}|g" \
            k8s-manifests/backend/deployment.yaml

      - name: Update frontend image tag
        run: |
          sed -i "s|image: ${{ env.FRONTEND_IMAGE }}:.*|image: ${{ env.FRONTEND_IMAGE }}:${GITHUB_SHA}|g" \
            k8s-manifests/frontend/deployment.yaml

      - name: Show updated manifests
        run: |
          cat k8s-manifests/backend/deployment.yaml
          cat k8s-manifests/frontend/deployment.yaml

      - name: Commit and push manifest updates for ArgoCD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s-manifests/backend/deployment.yaml k8s-manifests/frontend/deployment.yaml
          git commit -m "Update image tags to ${GITHUB_SHA} for ArgoCD sync [skip ci]" || echo "No changes to commit"
          git push origin main

  verify-eks-access:
    name: Verify EKS Cluster Access
    needs: update-k8s-manifests
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Verify EKS cluster connectivity
        run: |
          aws sts get-caller-identity
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"
          kubectl cluster-info
          kubectl get nodes

      - name: ArgoCD deployment note
        run: |
          echo "Deployment is handled by ArgoCD — no kubectl apply in this pipeline."
          echo "ArgoCD will sync k8s-manifests/ from Git after manifest commit."
