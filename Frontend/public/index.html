<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Catalog</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-soft: #eef4f8;
      --ink: #15202b;
      --muted: #607080;
      --line: #d8e2ea;
      --brand: #116a7b;
      --brand-dark: #0a4f5f;
      --green: #1f8a5b;
      --amber: #b7791f;
      --red: #c2413f;
      --blue: #2563a8;
      --shadow: 0 18px 45px rgba(21, 32, 43, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(180deg, #eaf2f6 0, rgba(234, 242, 246, 0) 360px),
        var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
      box-shadow: var(--shadow);
      flex: 0 0 auto;
    }

    .brand h1 {
      font-size: clamp(1.35rem, 3vw, 2rem);
      line-height: 1.05;
      font-weight: 800;
    }

    .brand p {
      color: var(--muted);
      margin-top: 4px;
      font-size: 0.94rem;
    }

    .status {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      border-radius: 999px;
      padding: 8px 14px;
      color: var(--muted);
      white-space: nowrap;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--amber);
      box-shadow: 0 0 0 4px rgba(183, 121, 31, 0.15);
    }

    .status.is-online .status-dot {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(31, 138, 91, 0.15);
    }

    .status.is-offline .status-dot {
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(194, 65, 63, 0.15);
    }

    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(216, 226, 234, 0.95);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric {
      padding: 18px;
      min-height: 104px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .metric strong {
      font-size: clamp(1.45rem, 3vw, 2rem);
      line-height: 1;
      margin-top: 14px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      gap: 16px;
      align-items: start;
    }

    .form-panel {
      padding: 20px;
      position: sticky;
      top: 16px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .section-title h2 {
      font-size: 1.05rem;
      line-height: 1.2;
    }

    .section-title span {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    .field label {
      color: #405060;
      font-size: 0.83rem;
      font-weight: 700;
    }

    .field input,
    .field select,
    .search input {
      width: 100%;
      border: 1px solid var(--line);
      background: #fbfdff;
      border-radius: 8px;
      min-height: 44px;
      padding: 10px 12px;
      color: var(--ink);
      outline: none;
    }

    .field input:focus,
    .field select:focus,
    .search input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(17, 106, 123, 0.16);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .button-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 8px;
      min-height: 44px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 800;
      color: var(--ink);
      background: var(--surface-soft);
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
      flex: 1;
    }

    .btn-primary:hover {
      background: var(--brand-dark);
    }

    .btn-icon {
      width: 44px;
      padding: 0;
    }

    .catalog {
      min-width: 0;
    }

    .toolbar {
      padding: 14px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 180px 44px;
      gap: 10px;
      align-items: center;
    }

    .search {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search input {
      padding-left: 38px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    .card {
      overflow: hidden;
      min-height: 190px;
      display: flex;
      flex-direction: column;
    }

    .card-accent {
      height: 7px;
      background: var(--brand);
    }

    .card-body {
      padding: 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      min-height: 58px;
    }

    .category {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--surface-soft);
      color: #405060;
      padding: 5px 9px;
      font-size: 0.76rem;
      font-weight: 800;
      max-width: 100%;
    }

    .product-name {
      margin-top: 10px;
      font-size: 1.05rem;
      line-height: 1.25;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .delete {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(194, 65, 63, 0.2);
      background: rgba(194, 65, 63, 0.08);
      color: var(--red);
      border-radius: 8px;
      font-size: 1.15rem;
      line-height: 1;
    }

    .delete:hover {
      background: rgba(194, 65, 63, 0.16);
    }

    .card-foot {
      margin-top: auto;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .price {
      font-size: 1.35rem;
      font-weight: 900;
    }

    .stock {
      color: var(--muted);
      font-size: 0.87rem;
      text-align: right;
    }

    .state {
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, 0.6);
      border-radius: 8px;
      min-height: 220px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      max-width: min(360px, calc(100% - 40px));
      background: var(--ink);
      color: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 10;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 920px) {
      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .form-panel {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 20px, 1180px);
        padding-top: 16px;
      }

      .topbar,
      .button-row {
        align-items: stretch;
        flex-direction: column;
      }

      .status {
        justify-content: center;
        white-space: normal;
      }

      .summary,
      .form-grid,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .toolbar .btn-icon {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">PC</div>
        <div>
          <h1>Product Catalog</h1>
          <p>Inventory backed by MySQL</p>
        </div>
      </div>
      <div class="status" id="status">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="status-text">Connecting</span>
      </div>
    </header>

    <section class="summary" aria-label="Catalog summary">
      <div class="panel metric">
        <span>Total products</span>
        <strong id="metric-count">0</strong>
      </div>
      <div class="panel metric">
        <span>Total stock</span>
        <strong id="metric-stock">0</strong>
      </div>
      <div class="panel metric">
        <span>Catalog value</span>
        <strong id="metric-value">Rs 0</strong>
      </div>
      <div class="panel metric">
        <span>Categories</span>
        <strong id="metric-category">0</strong>
      </div>
    </section>

    <section class="workspace">
      <aside class="panel form-panel">
        <div class="section-title">
          <h2>Add Product</h2>
          <span id="form-state">Ready</span>
        </div>
        <form id="product-form">
          <div class="field">
            <label for="inp-name">Name</label>
            <input id="inp-name" type="text" autocomplete="off" required />
          </div>
          <div class="field">
            <label for="inp-category">Category</label>
            <input id="inp-category" type="text" list="category-options" autocomplete="off" required />
            <datalist id="category-options"></datalist>
          </div>
          <div class="form-grid">
            <div class="field">
              <label for="inp-price">Price</label>
              <input id="inp-price" type="number" min="1" step="1" required />
            </div>
            <div class="field">
              <label for="inp-stock">Stock</label>
              <input id="inp-stock" type="number" min="0" step="1" value="0" />
            </div>
          </div>
          <div class="button-row">
            <button class="btn btn-primary" type="submit"><span aria-hidden="true">+</span> Add Product</button>
            <button class="btn btn-icon" type="reset" title="Clear form" aria-label="Clear form">×</button>
          </div>
        </form>
      </aside>

      <section class="catalog" aria-label="Products">
        <div class="panel toolbar">
          <div class="search">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <input id="search" type="search" placeholder="Search products" autocomplete="off" />
          </div>
          <select id="category-filter" aria-label="Filter by category">
            <option value="all">All categories</option>
          </select>
          <button class="btn btn-icon" id="refresh" type="button" title="Refresh products" aria-label="Refresh products">↻</button>
        </div>
        <div id="state" class="state">Loading products</div>
        <div class="grid" id="product-grid" hidden></div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const BACKEND = '__BACKEND_URL__';
    const state = {
      products: [],
      search: '',
      category: 'all',
    };

    const els = {
      status: document.getElementById('status'),
      statusText: document.getElementById('status-text'),
      metricCount: document.getElementById('metric-count'),
      metricStock: document.getElementById('metric-stock'),
      metricValue: document.getElementById('metric-value'),
      metricCategory: document.getElementById('metric-category'),
      form: document.getElementById('product-form'),
      formState: document.getElementById('form-state'),
      name: document.getElementById('inp-name'),
      categoryInput: document.getElementById('inp-category'),
      price: document.getElementById('inp-price'),
      stock: document.getElementById('inp-stock'),
      categoryOptions: document.getElementById('category-options'),
      categoryFilter: document.getElementById('category-filter'),
      search: document.getElementById('search'),
      refresh: document.getElementById('refresh'),
      stateBox: document.getElementById('state'),
      grid: document.getElementById('product-grid'),
      toast: document.getElementById('toast'),
    };

    function money(value) {
      return `Rs ${Number(value || 0).toLocaleString()}`;
    }

    function setStatus(mode, text) {
      els.status.className = `status ${mode ? `is-${mode}` : ''}`.trim();
      els.statusText.textContent = text;
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('is-visible');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        els.toast.classList.remove('is-visible');
      }, 2400);
    }

    function categoryColor(category) {
      const colors = ['#116a7b', '#2563a8', '#1f8a5b', '#b7791f', '#8a4f7d', '#c2413f'];
      const total = String(category || '').split('').reduce((sum, char) => sum + char.charCodeAt(0), 0);
      return colors[total % colors.length];
    }

    function productMatches(product) {
      const query = state.search.toLowerCase();
      const matchesSearch = !query
        || product.name.toLowerCase().includes(query)
        || product.category.toLowerCase().includes(query);
      const matchesCategory = state.category === 'all' || product.category === state.category;
      return matchesSearch && matchesCategory;
    }

    function updateSummary() {
      const categories = new Set(state.products.map(product => product.category));
      const stock = state.products.reduce((sum, product) => sum + Number(product.stock || 0), 0);
      const value = state.products.reduce((sum, product) => {
        return sum + (Number(product.price || 0) * Number(product.stock || 0));
      }, 0);

      els.metricCount.textContent = state.products.length.toLocaleString();
      els.metricStock.textContent = stock.toLocaleString();
      els.metricValue.textContent = money(value);
      els.metricCategory.textContent = categories.size.toLocaleString();
    }

    function updateCategoryControls() {
      const categories = [...new Set(state.products.map(product => product.category))].sort();
      const current = state.category;

      els.categoryFilter.replaceChildren(new Option('All categories', 'all'));
      els.categoryOptions.replaceChildren();

      categories.forEach(category => {
        els.categoryFilter.append(new Option(category, category));
        const option = document.createElement('option');
        option.value = category;
        els.categoryOptions.append(option);
      });

      els.categoryFilter.value = categories.includes(current) ? current : 'all';
      state.category = els.categoryFilter.value;
    }

    function createProductCard(product) {
      const card = document.createElement('article');
      card.className = 'panel card';

      const accent = document.createElement('div');
      accent.className = 'card-accent';
      accent.style.background = categoryColor(product.category);

      const body = document.createElement('div');
      body.className = 'card-body';

      const head = document.createElement('div');
      head.className = 'card-head';

      const titleWrap = document.createElement('div');
      const category = document.createElement('span');
      category.className = 'category';
      category.textContent = product.category;

      const name = document.createElement('h3');
      name.className = 'product-name';
      name.textContent = product.name;

      const del = document.createElement('button');
      del.className = 'delete';
      del.type = 'button';
      del.title = `Delete ${product.name}`;
      del.setAttribute('aria-label', `Delete ${product.name}`);
      del.textContent = '×';
      del.addEventListener('click', () => deleteProduct(product.id));

      const foot = document.createElement('div');
      foot.className = 'card-foot';

      const price = document.createElement('div');
      price.className = 'price';
      price.textContent = money(product.price);

      const stock = document.createElement('div');
      stock.className = 'stock';
      stock.textContent = `${Number(product.stock || 0).toLocaleString()} in stock`;

      titleWrap.append(category, name);
      head.append(titleWrap, del);
      foot.append(price, stock);
      body.append(head, foot);
      card.append(accent, body);
      return card;
    }

    function renderProducts() {
      updateSummary();
      updateCategoryControls();

      const visible = state.products.filter(productMatches);
      els.grid.replaceChildren();

      if (visible.length === 0) {
        els.grid.hidden = true;
        els.stateBox.hidden = false;
        els.stateBox.textContent = state.products.length === 0 ? 'No products yet' : 'No matching products';
        return;
      }

      els.stateBox.hidden = true;
      els.grid.hidden = false;
      visible.forEach(product => els.grid.append(createProductCard(product)));
    }

    async function loadProducts() {
      els.stateBox.hidden = false;
      els.stateBox.textContent = 'Loading products';
      setStatus('', 'Connecting');

      try {
        const response = await fetch(`${BACKEND}/api/products`);
        const json = await response.json();

        if (!response.ok || !json.success) {
          throw new Error(json.message || 'Unable to load products');
        }

        state.products = json.data || [];
        setStatus('online', 'Backend connected');
        renderProducts();
      } catch (err) {
        els.grid.hidden = true;
        els.stateBox.hidden = false;
        els.stateBox.textContent = 'Products could not be loaded';
        setStatus('offline', 'Backend unavailable');
        showToast(err.message);
      }
    }

    async function addProduct(event) {
      event.preventDefault();

      const payload = {
        name: els.name.value.trim(),
        category: els.categoryInput.value.trim(),
        price: els.price.value,
        stock: els.stock.value || 0,
      };

      if (!payload.name || !payload.category || !payload.price) {
        showToast('Name, category, and price are required');
        return;
      }

      els.formState.textContent = 'Saving';

      try {
        const response = await fetch(`${BACKEND}/api/products`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const json = await response.json();

        if (!response.ok || !json.success) {
          throw new Error(json.message || 'Product was not saved');
        }

        els.form.reset();
        els.stock.value = 0;
        showToast('Product added');
        await loadProducts();
      } catch (err) {
        showToast(err.message);
      } finally {
        els.formState.textContent = 'Ready';
      }
    }

    async function deleteProduct(id) {
      try {
        const response = await fetch(`${BACKEND}/api/products/${id}`, { method: 'DELETE' });
        const json = await response.json();

        if (!response.ok || !json.success) {
          throw new Error(json.message || 'Product was not deleted');
        }

        showToast('Product deleted');
        await loadProducts();
      } catch (err) {
        showToast(err.message);
      }
    }

    els.form.addEventListener('submit', addProduct);
    els.search.addEventListener('input', (event) => {
      state.search = event.target.value.trim();
      renderProducts();
    });
    els.categoryFilter.addEventListener('change', (event) => {
      state.category = event.target.value;
      renderProducts();
    });
    els.refresh.addEventListener('click', loadProducts);

    loadProducts();
  </script>
</body>
</html>
